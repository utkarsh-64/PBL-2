services:
  # Database Service (auto-managed PostgreSQL on Render)
  - type: psqldb
    name: wealthwise-db
    plan: free

  # Django Core API
  - type: web
    name: wealthwise-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn wealthwise.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wealthwise-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENV_MODE
        value: "prod"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: KITE_API_KEY
        value: "PLACEHOLDER" # Update these on the Render Dashboard
      - key: KITE_API_SECRET
        value: "PLACEHOLDER" # Update these on the Render Dashboard
      - key: FASTAPI_URL_PROD
        value: "https://wealthwise-ml.onrender.com"

  # FastAPI AI Prediction Service
  - type: web
    name: wealthwise-ml
    env: python
    rootDir: predictions
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
